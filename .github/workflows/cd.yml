name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/github/b1-b2

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Build backend and frontend images
        run: docker compose build backend frontend

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=frontend/.next \
            --exclude=frontend/node_modules \
            --exclude=frontend/data \
            --exclude=backend/.venv \
            --exclude=backend/__pycache__ \
            -czf "$RUNNER_TEMP/deploy.tar.gz" \
            .
          cp "$RUNNER_TEMP/deploy.tar.gz" deploy.tar.gz

      - name: Ensure deploy directory exists on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST_IP }}
          port: ${{ secrets.HOST_PORT }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p "${{ env.DEPLOY_PATH }}"

      - name: Upload deployment archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_IP }}
          port: ${{ secrets.HOST_PORT }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: deploy.tar.gz
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST_IP }}
          port: ${{ secrets.HOST_PORT }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu
            APP_DIR="${{ env.DEPLOY_PATH }}"
            ARCHIVE_PATH="$(find "$APP_DIR" -maxdepth 2 -name deploy.tar.gz | head -n 1 || true)"

            mkdir -p "$APP_DIR"
            test -n "$ARCHIVE_PATH"
            find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name "$(basename "$ARCHIVE_PATH")" -exec rm -rf {} +
            tar -xzf "$ARCHIVE_PATH" -C "$APP_DIR"
            rm -f "$ARCHIVE_PATH"

            if docker compose version >/dev/null 2>&1; then
              DOCKER_CMD="docker"
            elif sudo -n docker compose version >/dev/null 2>&1; then
              DOCKER_CMD="sudo docker"
            else
              echo "docker compose is unavailable for ${USER}"
              exit 1
            fi

            cat > "$APP_DIR/.env" <<EOF
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            OPENROUTER_MODEL=${{ secrets.OPENROUTER_MODEL }}
            OPENROUTER_SITE_URL=${{ secrets.OPENROUTER_SITE_URL }}
            OPENROUTER_APP_NAME=${{ secrets.OPENROUTER_APP_NAME }}
            OPENROUTER_TEMPERATURE=${{ secrets.OPENROUTER_TEMPERATURE }}
            OPENROUTER_MAX_TOKENS=${{ secrets.OPENROUTER_MAX_TOKENS }}
            EOF

            cd "$APP_DIR"
            $DOCKER_CMD compose up -d --build --remove-orphans

            BACKEND_CONTAINER="$($DOCKER_CMD compose ps -q backend)"
            FRONTEND_CONTAINER="$($DOCKER_CMD compose ps -q frontend)"

            test -n "$BACKEND_CONTAINER"
            test -n "$FRONTEND_CONTAINER"
            test "$($DOCKER_CMD inspect -f '{{.State.Running}}' "$BACKEND_CONTAINER")" = "true"
            test "$($DOCKER_CMD inspect -f '{{.State.Running}}' "$FRONTEND_CONTAINER")" = "true"

            $DOCKER_CMD compose ps
