name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/github/b1-b2
  RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  verify:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Build backend and frontend images
        run: docker compose build backend frontend

  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - name: Create deployment archive
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=frontend/.next \
            --exclude=frontend/node_modules \
            --exclude=frontend/data \
            --exclude=backend/.venv \
            --exclude=backend/__pycache__ \
            -czf "$RUNNER_TEMP/deploy.tar.gz" \
            .

      - name: Configure SSH
        shell: bash
        run: |
          set -eu
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Validate SSH connectivity
        shell: bash
        run: |
          set -eu
          SSH_OPTS=(
            -i "$HOME/.ssh/deploy_key"
            -o StrictHostKeyChecking=accept-new
            -o BatchMode=yes
            -o ConnectTimeout=15
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -p "${{ secrets.HOST_PORT }}"
          )
          ssh \
            -vv \
            "${SSH_OPTS[@]}" \
            "${{ secrets.HOST_USER }}@${{ secrets.HOST_IP }}" \
            "echo SSH connection established on \$(hostname); id; uname -a"

      - name: Ensure deploy directory exists on VPS
        shell: bash
        run: |
          set -eu
          SSH_OPTS=(
            -i "$HOME/.ssh/deploy_key"
            -o StrictHostKeyChecking=accept-new
            -o BatchMode=yes
            -o ConnectTimeout=15
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -p "${{ secrets.HOST_PORT }}"
          )
          ssh \
            "${SSH_OPTS[@]}" \
            "${{ secrets.HOST_USER }}@${{ secrets.HOST_IP }}" \
            "mkdir -p '${{ env.DEPLOY_PATH }}'"

      - name: Upload deployment archive
        shell: bash
        run: |
          set -euxo pipefail
          SSH_OPTS=(
            -i "$HOME/.ssh/deploy_key"
            -o StrictHostKeyChecking=accept-new
            -o BatchMode=yes
            -o ConnectTimeout=15
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -p "${{ secrets.HOST_PORT }}"
          )
          ARCHIVE_SIZE="$(wc -c < "$RUNNER_TEMP/deploy.tar.gz")"
          ssh \
            -vv \
            "${SSH_OPTS[@]}" \
            "${{ secrets.HOST_USER }}@${{ secrets.HOST_IP }}" \
            "cat > '${{ env.DEPLOY_PATH }}/deploy.tar.gz'" < "$RUNNER_TEMP/deploy.tar.gz"
          ssh \
            "${SSH_OPTS[@]}" \
            "${{ secrets.HOST_USER }}@${{ secrets.HOST_IP }}" \
            "test \"\$(wc -c < '${{ env.DEPLOY_PATH }}/deploy.tar.gz')\" = '$ARCHIVE_SIZE'"

      - name: Deploy on VPS
        shell: bash
        run: |
          set -eu
          SSH_OPTS=(
            -i "$HOME/.ssh/deploy_key"
            -o StrictHostKeyChecking=accept-new
            -o BatchMode=yes
            -o ConnectTimeout=15
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -p "${{ secrets.HOST_PORT }}"
          )
          ssh \
            "${SSH_OPTS[@]}" \
            "${{ secrets.HOST_USER }}@${{ secrets.HOST_IP }}" \
            'bash -se' <<'EOF'
          set -eu
          APP_DIR="${{ env.DEPLOY_PATH }}"
          ARCHIVE_PATH="$APP_DIR/deploy.tar.gz"
          RELEASE_SHA="${{ env.RELEASE_SHA }}"

          mkdir -p "$APP_DIR"
          test -f "$ARCHIVE_PATH"
          find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name "$(basename "$ARCHIVE_PATH")" -exec rm -rf {} +
          tar -xzf "$ARCHIVE_PATH" -C "$APP_DIR"
          rm -f "$ARCHIVE_PATH"

          if docker compose version >/dev/null 2>&1; then
            DOCKER_CMD=(docker)
          elif sudo -n docker compose version >/dev/null 2>&1; then
            DOCKER_CMD=(sudo docker)
          else
            echo "docker compose is unavailable for ${USER}"
            exit 1
          fi

          cat > "$APP_DIR/.env" <<ENVEOF
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL=${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_SITE_URL=${{ secrets.OPENROUTER_SITE_URL }}
          OPENROUTER_APP_NAME=${{ secrets.OPENROUTER_APP_NAME }}
          OPENROUTER_TEMPERATURE=${{ secrets.OPENROUTER_TEMPERATURE }}
          OPENROUTER_MAX_TOKENS=${{ secrets.OPENROUTER_MAX_TOKENS }}
          ENVEOF

          cat > "$APP_DIR/.release-version" <<ENVEOF
          RELEASE_SHA=$RELEASE_SHA
          DEPLOYED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ENVEOF

          cd "$APP_DIR"
          "${DOCKER_CMD[@]}" compose down --remove-orphans || true
          "${DOCKER_CMD[@]}" compose up -d --build --force-recreate --remove-orphans

          BACKEND_CONTAINER="$("${DOCKER_CMD[@]}" compose ps -q backend)"
          FRONTEND_CONTAINER="$("${DOCKER_CMD[@]}" compose ps -q frontend)"

          test -n "$BACKEND_CONTAINER"
          test -n "$FRONTEND_CONTAINER"
          test "$("${DOCKER_CMD[@]}" inspect -f '{{.State.Running}}' "$BACKEND_CONTAINER")" = "true"
          test "$("${DOCKER_CMD[@]}" inspect -f '{{.State.Running}}' "$FRONTEND_CONTAINER")" = "true"

          cat "$APP_DIR/.release-version"
          "${DOCKER_CMD[@]}" compose ps
          EOF
